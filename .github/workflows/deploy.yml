name: Bereitstellung auf Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 3. Construir Proyecto (GitHub)
        run: |
          npm install
          npm run build

      - name: 4. Empaquetar TODO (Tar)
        run: |
          tar -czf deploy.tar.gz dist standalone-server.cjs package*.json Dockerfile docker-compose.yml .dockerignore

      - name: 5. Subir Paquete (SCP Único)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "deploy.tar.gz"
          target: "~/"

      - name: 6. Sincronización Detallada y Espionaje de Configuración
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            echo "--- ESPIANDO CONFIGURACIÓN DE OPENCLAW (Lo que funciona) ---"
            OPENCLAW_ID=$(docker ps -a --format '{{.Names}}' | grep openclaw | head -n 1)
            if [ -n "$OPENCLAW_ID" ]; then
                echo "Labels de Openclaw:"
                docker inspect $OPENCLAW_ID --format '{{json .Config.Labels}}'
                echo "Redes de Openclaw:"
                docker inspect $OPENCLAW_ID --format '{{range $net, $conf := .NetworkSettings.Networks}}{{$net}}{{println}}{{end}}'
            else
                echo "No se encontró el contenedor Openclaw."
            fi
            
            echo "--- BUSCANDO TRAEFIK ---"
            docker ps -a | grep traefik || echo "No se ve Traefik por aquí."
            
            echo "--- RUTA ACTIVA ---"
            REAL_PATH=$(docker inspect wartungsplan --format '{{ index .Config.Labels "com.docker.compose.project.working_dir" }}' 2>/dev/null)
            [ -z "$REAL_PATH" ] && REAL_PATH="$HOME/interstellar-nebula"
            
            cd $REAL_PATH
            rm -rf dist
            tar -xzf ~/deploy.tar.gz -C ./
            
            # Docker Compose
            DOCKER_CMD="docker compose"
            if ! docker compose version &> /dev/null; then DOCKER_CMD="docker-compose"; fi
            
            $DOCKER_CMD build --no-cache
            $DOCKER_CMD up -d --force-recreate
            
            echo "Estado Final:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" | grep wartungsplan
