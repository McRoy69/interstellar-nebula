name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Conectar por SSH y actualizar código
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Intentar encontrar la carpeta del proyecto
            if [ -d "~/wartungsplan-blessing" ]; then cd ~/wartungsplan-blessing;
            elif [ -d "/root/wartungsplan-blessing" ]; then cd /root/wartungsplan-blessing;
            elif [ -d "/var/www/wartungsplan-blessing" ]; then cd /var/www/wartungsplan-blessing;
            else echo "Carpeta del proyecto no encontrada"; exit 1; fi

            # 2. Descargar los cambios de GitHub (usando la rama correcta: main)
            git fetch origin main
            git reset --hard origin/main

            # 3. Reinstalar dependencias (opcional, pero útil si cambian)
            # npm install --production

            # 4. Reiniciar los contenedores
            docker-compose restart || docker restart $(docker ps -q --filter name=wartungsplan)
