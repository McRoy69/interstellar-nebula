name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
      - hauptsächlich
      - principalmente

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Conectar por SSH y actualizar código
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            # 1. Buscar la carpeta del proyecto de forma más flexible
            PROJECT_DIR=""
            if [ -d "$HOME/interstellar-nebula" ]; then PROJECT_DIR="$HOME/interstellar-nebula";
            elif [ -d "/root/interstellar-nebula" ]; then PROJECT_DIR="/root/interstellar-nebula";
            elif [ -d "/var/www/interstellar-nebula" ]; then PROJECT_DIR="/var/www/interstellar-nebula";
            fi

            if [ -z "$PROJECT_DIR" ]; then 
              echo "ERROR: No se encontró la carpeta del proyecto en ninguna de las rutas conocidas."
              ls -la $HOME
              exit 1
            fi

            cd $PROJECT_DIR
            echo "Trabajando en: $(pwd)"

            # 2. Sincronizar con GitHub (SOLO archivos de código, sin borrar datos)
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            # He quitado 'git clean -fd' para proteger tu base de datos y archivos .env

            # 3. Detectar comando Docker (con o sin guion)
            DOCKER_CMD="docker compose"
            if ! docker compose version &> /dev/null; then
              DOCKER_CMD="docker-compose"
            fi
            echo "Usando comando: $DOCKER_CMD"

            # 4. Diagnóstico PRE-Arranque
            echo "--- ESTADO DE PUERTOS (Buscando puerto 3000) ---"
            (ss -tulnp | grep :3000) || echo "Puerto 3000 libre."

            # 5. Reconstrucción AGRESIVA
            echo "--- REINICIANDO CONTENEDOR ---"
            $DOCKER_CMD down || true
            $DOCKER_CMD build --no-cache
            $DOCKER_CMD up -d --force-recreate

            # 6. Diagnóstico POST-Arranque
            sleep 5
            echo "--- ESTADO ACTUAL DE DOCKER ---"
            $DOCKER_CMD ps
            
            echo "--- ÚLTIMOS LOGS DEL SERVIDOR ---"
            $DOCKER_CMD logs --tail 30 wartungsplan
            
            echo "Autopsia de despliegue completada."
