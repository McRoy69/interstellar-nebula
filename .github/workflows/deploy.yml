name: Bereitstellung auf Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 3. Construir Proyecto (GitHub)
        run: |
          npm install
          npm run build

      - name: 4. Empaquetar TODO (Tar)
        run: |
          tar -czf deploy.tar.gz dist standalone-server.cjs package*.json Dockerfile docker-compose.yml .dockerignore

      - name: 5. Subir Paquete (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "deploy.tar.gz"
          target: "~/"

      - name: 6. Sincronización Detallada y Diagnóstico Final
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            echo "--- PANORAMA COMPLETO DE CONTENEDORES ---"
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
            
            echo "--- BUSCANDO RED DE TRAEFIK ---"
            TRAEFIK_NAME=$(docker ps --format '{{.Names}}' | grep traefik | head -n 1)
            if [ -n "$TRAEFIK_NAME" ]; then
                echo "Traefik encontrado: $TRAEFIK_NAME"
                echo "Redes de Traefik:"
                docker inspect $TRAEFIK_NAME --format '{{range $net, $conf := .NetworkSettings.Networks}}{{$net}}{{println}}{{end}}'
            else
                echo "AVISO: No se encuentra ningún contenedor con el nombre 'traefik'."
            fi
            
            echo "--- LISTADO DE REDES (Repaso) ---"
            docker network ls
            
            echo "--- INTENTO DE ARRANQUE (Fallback a modo básico) ---"
            # Buscamos la ruta
            REAL_PATH=$(docker inspect wartungsplan --format '{{ index .Config.Labels "com.docker.compose.project.working_dir" }}' 2>/dev/null)
            [ -z "$REAL_PATH" ] && REAL_PATH="$HOME/interstellar-nebula"
            
            cd $REAL_PATH
            rm -rf dist
            tar -xzf ~/deploy.tar.gz -C ./
            
            # Docker Compose detect
            DOCKER_CMD="docker compose"
            if ! docker compose version &> /dev/null; then DOCKER_CMD="docker-compose"; fi
            
            # Intentamos arrancar sin red externa por si acaso es el bloqueo
            # Primero quitamos la red externa del archivo temporalmente si es necesario
            # Pero mejor solo probamos el UP normal y leemos el error
            $DOCKER_CMD build --no-cache
            $DOCKER_CMD up -d --force-recreate || echo "El arranque sigue fallando por la red."
