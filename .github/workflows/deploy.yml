name: Bereitstellung auf Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 3. Construir Proyecto (GitHub)
        run: |
          npm install
          npm run build

      - name: 4. Empaquetar TODO (Tar)
        run: |
          tar -czf deploy.tar.gz dist standalone-server.cjs package*.json Dockerfile docker-compose.yml .dockerignore

      - name: 5. Subir Paquete (SCP Único)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "deploy.tar.gz"
          target: "~/"

      - name: 6. Sincronización y Reparación de Permisos
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            # Detectar ruta activa del proyecto
            REAL_PATH=$(docker inspect wartungsplan --format '{{ index .Config.Labels "com.docker.compose.project.working_dir" }}' 2>/dev/null)
            if [ -z "$REAL_PATH" ]; then
                REAL_PATH=$(docker inspect wartungsplan --format '{{ range .Mounts }}{{ if eq .Destination "/app/Journal" }}{{ .Source }}{{ end }}{{ end }}' 2>/dev/null | xargs dirname)
            fi
            [ -z "$REAL_PATH" ] && REAL_PATH="$HOME/interstellar-nebula"
            
            echo "OPERANDO EN: $REAL_PATH"
            mkdir -p $REAL_PATH/Journal $REAL_PATH/Journal_Archiv
            
            # Asegurar que el archivo de base de datos existe para que Docker no cree una carpeta con ese nombre
            if [ ! -f "$REAL_PATH/database.sqlite" ]; then
                echo "Creando base de datos inicial..."
                touch "$REAL_PATH/database.sqlite"
            fi
            
            # REPARACIÓN DE PERMISOS (Crucial para SQLite en Docker)
            echo "Reparando permisos..."
            chmod 666 "$REAL_PATH/database.sqlite" || true
            chmod -R 777 $REAL_PATH/Journal $REAL_PATH/Journal_Archiv || true
            
            cd $REAL_PATH
            rm -rf dist
            tar -xzf ~/deploy.tar.gz -C ./
            rm ~/deploy.tar.gz
            
            # Docker Compose
            DOCKER_CMD="docker compose"
            if ! docker compose version &> /dev/null; then DOCKER_CMD="docker-compose"; fi
            
            $DOCKER_CMD build --no-cache
            $DOCKER_CMD up -d --force-recreate
            
            echo "--- ESTADO DE ARCHIVOS ---"
            ls -la
            
            echo "--- VERIFICACIÓN DE ARRANQUE ---"
            sleep 5
            docker logs wartungsplan --tail 20
