name: Bereitstellung auf Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js (Vite/Tailwind 4)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 3. Construir Proyecto (GitHub)
        run: |
          npm install
          npm run build

      - name: 4. Empaquetar para Despliegue Rápido (Tar)
        run: |
          tar -czf deploy.tar.gz dist standalone-server.cjs package*.json Dockerfile docker-compose.yml

      - name: 5. Subir Paquete (SCP Único)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "deploy.tar.gz"
          target: "~/"
          strip_components: 0

      - name: 6. Descomprimir y Reiniciar (Producción)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            # Detección inteligente de ruta activa
            REAL_PATH=$(docker inspect wartungsplan --format '{{ index .Config.Labels "com.docker.compose.project.working_dir" }}' 2>/dev/null)
            if [ -z "$REAL_PATH" ]; then
                REAL_PATH=$(docker inspect wartungsplan --format '{{ range .Mounts }}{{ if eq .Destination "/app/Journal" }}{{ .Source }}{{ end }}{{ end }}' 2>/dev/null | xargs dirname)
            fi
            [ -z "$REAL_PATH" ] && REAL_PATH="$HOME/interstellar-nebula"
            
            mkdir -p $REAL_PATH
            
            # Descomprimir directamente en la ruta (Ultra rápido)
            tar -xzf ~/deploy.tar.gz -C $REAL_PATH
            rm ~/deploy.tar.gz
            
            cd $REAL_PATH
            
            # Docker Compose detect & Up
            DOCKER_CMD="docker compose"
            if ! docker compose version &> /dev/null; then DOCKER_CMD="docker-compose"; fi
            
            $DOCKER_CMD up -d --build --force-recreate
            echo "Despliegue comprimido finalizado con éxito."
