name: Bereitstellung auf Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 3. Construir Proyecto (GitHub)
        run: |
          npm install
          npm run build

      - name: 4. Empaquetar TODO (Tar)
        run: |
          tar -czf deploy.tar.gz dist standalone-server.cjs package*.json Dockerfile docker-compose.yml .dockerignore

      - name: 5. Subir Paquete (SCP Único)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "deploy.tar.gz"
          target: "~/"

      - name: 6. Sincronización Profesional y Rescate
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            set -e
            
            # 1. Detectar ruta
            REAL_PATH=$(docker inspect wartungsplan --format '{{ index .Config.Labels "com.docker.compose.project.working_dir" }}' 2>/dev/null || echo "$HOME/interstellar-nebula")
            echo "OPERANDO EN: $REAL_PATH"
            cd $REAL_PATH
            
            # 2. LIMPIEZA CRÍTICA (Borrar carpetas falsas creadas por Docker que bloquean el inicio)
            # Solo borramos si SON DIRECTORIOS. Los archivos reales de datos no se tocan.
            [ -d "database.sqlite" ] && echo "Borrando carpeta falsa DB..." && rm -rf database.sqlite
            [ -d "Journal" ] && [ ! -s "Journal" ] && echo "Borrando carpeta falsa Journal..." && rm -rf Journal
            
            # 3. Instalación código nuevo
            rm -rf dist
            tar -xzf ~/deploy.tar.gz -C ./
            rm ~/deploy.tar.gz
            
            # 4. Reinicio limpio
            DOCKER_CMD="docker compose"
            if ! docker compose version &> /dev/null; then DOCKER_CMD="docker-compose"; fi
            
            $DOCKER_CMD build --no-cache
            $DOCKER_CMD up -d --force-recreate
            
            echo "--- BUSCANDO BASE DE DATOS REAL PARA EL SIGUIENTE PASO ---"
            find $HOME -name "database.sqlite" -type f || echo "No se encontró el archivo de datos aún."
            
            echo "ESTADO FINAL:"
            docker ps --format "table {{.Names}}\t{{.Status}}" | grep wartungsplan
