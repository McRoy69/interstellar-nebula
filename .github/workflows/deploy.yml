name: Bereitstellung auf Hostinger VPS

on:
  push:
    branches:
      - main
      - '*' # Ejecutar en cualquier rama para facilitar las pruebas

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 3. Construir Proyecto (En GitHub para ahorrar RAM en VPS)
        run: |
          npm install
          npm run build

      - name: 4. Subir archivos al servidor (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "dist/*,standalone-server.cjs,package*.json,Dockerfile,docker-compose.yml"
          target: "interstellar-nebula"
          strip_components: 0

      - name: 5. Reiniciar Servidor (SSH Ligero)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            cd interstellar-nebula
            
            # Detectar comando Docker
            DOCKER_CMD="docker compose"
            if ! docker compose version &> /dev/null; then
              DOCKER_CMD="docker-compose"
            fi
            
            echo "--- REINICIANDO CONSTRUIDO ---"
            $DOCKER_CMD up -d --build --force-recreate
            
            echo "Despliegue final exitoso (Build en GitHub)."
