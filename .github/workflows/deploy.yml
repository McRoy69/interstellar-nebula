name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
      - hauptsächlich
      - principalmente

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Conectar por SSH y actualizar código
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            # 1. Buscar la carpeta del proyecto de forma más flexible
            PROJECT_DIR=""
            if [ -d "$HOME/wartungsplan-blessing" ]; then PROJECT_DIR="$HOME/wartungsplan-blessing";
            elif [ -d "/root/wartungsplan-blessing" ]; then PROJECT_DIR="/root/wartungsplan-blessing";
            elif [ -d "/var/www/wartungsplan-blessing" ]; then PROJECT_DIR="/var/www/wartungsplan-blessing";
            fi

            if [ -z "$PROJECT_DIR" ]; then 
              echo "ERROR: No se encontró la carpeta del proyecto en ninguna de las rutas conocidas."
              ls -la $HOME
              exit 1
            fi

            cd $PROJECT_DIR
            echo "Trabajando en: $(pwd)"

            # 2. Sincronizar con GitHub (limpiando posibles conflictos locales)
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            git clean -fd

            # 3. Reiniciar el servicio
            # Intentamos docker-compose primero, luego reinicio por nombre
            docker-compose restart || docker restart $(docker ps -q --filter name=wartungsplan) || echo "Aviso: No se pudo reiniciar el contenedor, pero el código se actualizó."
