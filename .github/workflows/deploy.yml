name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Conectar por SSH y actualizar código
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Entrar a la carpeta del proyecto en el servidor
            # Nota: Si tu carpeta tiene otro nombre en el servidor, cámbialo aquí:
            cd ~/wartungsplan-blessing || cd /root/wartungsplan-blessing || cd /var/www/wartungsplan-blessing

            # 2. Descargar los cambios de GitHub
            git pull origin hauptsächlich

            # 3. Reinstalar dependencias (si hubo cambios)
            npm install

            # 4. Reiniciar el contenedor Docker (esto forzará a que tome los cambios)
            # Ajusta el nombre de tu contenedor si es diferente
            docker restart wartungsplan-blessing || docker-compose restart
