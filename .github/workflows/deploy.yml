name: Bereitstellung auf Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 3. Construir Proyecto (GitHub)
        run: |
          npm install
          npm run build

      - name: 4. Empaquetar TODO (Tar)
        run: |
          tar -czf deploy.tar.gz dist standalone-server.cjs package*.json Dockerfile docker-compose.yml .dockerignore

      - name: 5. Subir Paquete (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "deploy.tar.gz"
          target: "~/"

      - name: 6. Sincronización Detallada y Reinicio
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            # No usamos 'set -e' aquí para poder ver las redes aunque falle
            
            echo "--- BUSCANDO RUTA ACTIVA ---"
            REAL_PATH=$(docker inspect wartungsplan --format '{{ index .Config.Labels "com.docker.compose.project.working_dir" }}' 2>/dev/null)
            if [ -z "$REAL_PATH" ]; then
                REAL_PATH=$(docker inspect wartungsplan --format '{{ range .Mounts }}{{ if eq .Destination "/app/Journal" }}{{ .Source }}{{ end }}{{ end }}' 2>/dev/null | xargs dirname)
            fi
            [ -z "$REAL_PATH" ] && REAL_PATH="$HOME/interstellar-nebula"
            
            echo "RUTA DETECTADA: $REAL_PATH"
            mkdir -p $REAL_PATH
            
            echo "--- DIAGNÓSTICO DE REDES ---"
            docker network ls
            
            echo "--- INSTALACIÓN LIMPIA ---"
            rm -rf $REAL_PATH/dist
            tar -xzf ~/deploy.tar.gz -C $REAL_PATH/
            rm ~/deploy.tar.gz
            
            cd $REAL_PATH
            
            # Docker Compose detect
            DOCKER_CMD="docker compose"
            if ! docker compose version &> /dev/null; then DOCKER_CMD="docker-compose"; fi
            
            echo "--- INTENTO DE ARRANQUE ---"
            # Si falla por la red, seguiremos viendo los logs del diagnóstico arriba
            $DOCKER_CMD build --no-cache
            $DOCKER_CMD up -d --force-recreate || echo "FALLO EN EL UP: Probablemente la red no existe."
            
            echo "Estado Final:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}" | grep wartungsplan || echo "Contenedor no arrancado."
