name: Bereitstellung auf Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 3. Construir Proyecto (GitHub)
        run: |
          npm install
          npm run build

      - name: 4. Empaquetar TODO (Tar)
        run: |
          tar -czf deploy.tar.gz dist standalone-server.cjs package*.json Dockerfile docker-compose.yml .dockerignore

      - name: 5. Subir Paquete (SCP Único)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "deploy.tar.gz"
          target: "~/"

      - name: 6. Operación de Limpieza y Búsqueda de Datos
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            # 1. PARAR TODO lo que esté bloqueando
            echo "--- LIMPIEZA DE CONTENEDORES ZOMBIES ---"
            docker stop wartungsplan || true
            docker rm wartungsplan || true
            
            # 2. LOCALIZAR LA RUTA REAL (La que tiene los datos)
            echo "--- BUSCANDO BASE DE DATOS REAL (Paciencia...) ---"
            # Buscamos archivos reales de SQLite, no las carpetas falsas de Docker
            find $HOME -name "database.sqlite" -type f
            
            # 3. VERIFICAR LA RUTA ACTUAL
            REAL_PATH=$(docker inspect wartungsplan --format '{{ index .Config.Labels "com.docker.compose.project.working_dir" }}' 2>/dev/null || echo "$HOME/interstellar-nebula")
            echo "RUTA ACTUAL DE TRABAJO: $REAL_PATH"
            
            # 4. BORRAR LA CARPETA FALSA que creó Docker
            if [ -d "$REAL_PATH/database.sqlite" ]; then
                echo "Borrando carpeta falsa 'database.sqlite'..."
                rm -rf "$REAL_PATH/database.sqlite"
            fi
            
            # 5. LISTAR CONTENIDO PARA COMPARAR
            ls -la $REAL_PATH
