name: Bereitstellung auf Hostinger VPS

on:
  push:
    branches:
      - main
      - '*' # Ejecutar en cualquier rama para facilitar las pruebas

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js (Vite/Tailwind 4)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 3. Construir Proyecto (En GitHub para ahorrar RAM en VPS)
        run: |
          npm install
          npm run build

      - name: 4. Subir archivos al servidor (Temp)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "dist,standalone-server.cjs,package*.json,Dockerfile,docker-compose.yml"
          target: "~/deploy_tmp"
          strip_components: 0

      - name: 5. Sincronizar y Reiniciar (Detección de Ruta Real)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            # --- BUSCAR RUTA DEL PROYECTO ---
            REAL_PATH=$(docker inspect wartungsplan --format '{{ range .Mounts }}{{ if eq .Destination "/app/Journal" }}{{ .Source }}{{ end }}{{ end }}' 2>/dev/null | xargs dirname)
            
            if [ -z "$REAL_PATH" ]; then
              if [ -d "$HOME/interstellar-nebula" ]; then REAL_PATH="$HOME/interstellar-nebula";
              elif [ -d "/root/interstellar-nebula" ]; then REAL_PATH="/root/interstellar-nebula";
              elif [ -d "/var/www/interstellar-nebula" ]; then REAL_PATH="/var/www/interstellar-nebula";
              else REAL_PATH="$HOME/interstellar-nebula"; fi
            fi
            
            # --- SINCRONIZACIÓN Y REINICIO ---
            cp -r ~/deploy_tmp/dist $REAL_PATH/
            cp ~/deploy_tmp/standalone-server.cjs $REAL_PATH/
            cp ~/deploy_tmp/package*.json $REAL_PATH/
            cp ~/deploy_tmp/Dockerfile $REAL_PATH/
            cp ~/deploy_tmp/docker-compose.yml $REAL_PATH/
            
            cd $REAL_PATH
            
            # Detectar comando Docker
            DOCKER_CMD="docker compose"
            if ! docker compose version &> /dev/null; then
              DOCKER_CMD="docker-compose"
            fi
            
            $DOCKER_CMD up -d --build --force-recreate
            rm -rf ~/deploy_tmp
            echo "Despliegue de producción completado con éxito."
