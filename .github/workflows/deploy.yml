name: Bereitstellung auf Hostinger VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Descargar Código
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 3. Construir Proyecto (GitHub)
        run: |
          npm install
          npm run build

      - name: 4. Subir archivos (Temp)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          source: "dist,standalone-server.cjs,package*.json,Dockerfile,docker-compose.yml"
          target: "~/deploy_tmp"
          strip_components: 0

      - name: 5. Sincronización y Reinicio (Producción)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            # Detección inteligente de ruta
            REAL_PATH=$(docker inspect wartungsplan --format '{{ index .Config.Labels "com.docker.compose.project.working_dir" }}' 2>/dev/null)
            if [ -z "$REAL_PATH" ]; then
                REAL_PATH=$(docker inspect wartungsplan --format '{{ range .Mounts }}{{ if eq .Destination "/app/Journal" }}{{ .Source }}{{ end }}{{ end }}' 2>/dev/null | xargs dirname)
            fi
            [ -z "$REAL_PATH" ] && REAL_PATH="$HOME/interstellar-nebula"
            
            mkdir -p $REAL_PATH
            
            # Sincronización espejo
            if command -v rsync >/dev/null 2>&1; then
                rsync -av --delete ~/deploy_tmp/ $REAL_PATH/
            else
                rm -rf $REAL_PATH/dist
                cp -rf ~/deploy_tmp/* $REAL_PATH/
            fi
            
            cd $REAL_PATH
            
            # Docker Compose detect
            DOCKER_CMD="docker compose"
            if ! docker compose version &> /dev/null; then DOCKER_CMD="docker-compose"; fi
            
            $DOCKER_CMD up -d --build --force-recreate
            rm -rf ~/deploy_tmp
            echo "Despliegue de producción finalizado correctamente."
